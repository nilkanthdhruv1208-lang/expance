<body class="bg-background text-on-surface font-body-lg min-h-screen flex flex-col">
<!-- Header (TopAppBar Pattern) -->
<header class="w-full top-0 sticky z-30 bg-background flex justify-between items-center px-margin-mobile py-md">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-surface-container-high transition-colors tap-scale" onclick="window.history.back()">
<span class="material-symbols-outlined text-on-surface">close</span>
</button>
<h1 class="font-title-md text-title-md text-on-surface">Add Transaction</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-grow px-margin-mobile flex flex-col space-y-lg pb-40">
<!-- Segmented Control (Credit/Debit) -->
<div class="mt-xs">
<div class="relative flex p-1 bg-surface-container-high rounded-full w-full max-w-sm mx-auto overflow-hidden">
<div class="absolute inset-y-1 left-1 w-[calc(50%-4px)] bg-surface-container-lowest rounded-full shadow-sm transition-transform duration-300 ease-out" id="segment-glider"></div>
<button class="relative z-10 flex-1 py-2 font-label-caps text-label-caps text-primary transition-colors" id="btn-expense" onclick="toggleType('expense')">
                    EXPENSE
                </button>
<button class="relative z-10 flex-1 py-2 font-label-caps text-label-caps text-on-surface-variant transition-colors" id="btn-income" onclick="toggleType('income')">
                    INCOME
                </button>
</div>
</div>
<!-- Amount Input Field (Visual Anchor) -->
<div class="flex flex-col items-center justify-center py-xl">
<span class="font-label-caps text-label-caps text-on-surface-variant mb-xs">AMOUNT</span>
<div class="flex items-baseline space-x-xs">
<span class="font-display-currency text-display-currency text-primary opacity-50">$</span>
<input autofocus="" class="font-display-currency text-display-currency bg-transparent border-none text-center w-full max-w-[200px] text-on-surface placeholder-surface-variant focus:ring-0" id="amount-input" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
<!-- Category Section (Scrollable Chips) -->
<div class="space-y-sm">
<div class="flex justify-between items-end">
<span class="font-label-caps text-label-caps text-on-surface-variant">CATEGORY</span>
<button class="text-primary font-label-caps text-label-caps hover:underline">VIEW ALL</button>
</div>
<div class="flex overflow-x-auto gap-md py-xs hide-scrollbar -mx-margin-mobile px-margin-mobile" id="category-chips">
<!-- Shopping -->
<button class="category-chip group flex flex-col items-center space-y-xs min-w-[72px] tap-scale" onclick="selectCategory(this)">
<div class="w-14 h-14 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant group-aria-selected:bg-primary group-aria-selected:text-on-primary transition-all shadow-sm">
<span class="material-symbols-outlined text-[24px]" data-icon="shopping_bag">shopping_bag</span>
</div>
<span class="font-body-sm text-body-sm text-on-surface-variant group-aria-selected:text-primary group-aria-selected:font-semibold">Shopping</span>
</button>
<!-- Food -->
<button aria-selected="true" class="category-chip group flex flex-col items-center space-y-xs min-w-[72px] tap-scale" onclick="selectCategory(this)">
<div class="w-14 h-14 rounded-full bg-primary flex items-center justify-center text-on-primary transition-all shadow-sm">
<span class="material-symbols-outlined text-[24px]" data-icon="restaurant">restaurant</span>
</div>
<span class="font-body-sm text-body-sm text-primary font-semibold">Food</span>
</button>
<!-- Transport -->
<button class="category-chip group flex flex-col items-center space-y-xs min-w-[72px] tap-scale" onclick="selectCategory(this)">
<div class="w-14 h-14 rounded-full bg-surface-container flex items-center justify-center text-on-surface-variant group-aria-selected:bg-primary group-aria-selected:text-on-primary transition-all shadow-sm">
<span class="material-symbols-outlined text-[24px]" data-icon="directions_car">directions_car</span>
</div>
<span class="font-body-sm text-body-sm text-on-surface-variant group-aria-selected:text-primary group-aria-selected:font-semibold">Transit</span>
</button>

</button>

</div>

<!-- Hidden date input for actual interaction if needed -->
<input class="hidden" id="date-picker" type="date"/>
<script>
        function toggleType(type) {
            const glider = document.getElementById('segment-glider');
            const btnExpense = document.getElementById('btn-expense');
            const btnIncome = document.getElementById('btn-income');
            
            if (type === 'income') {
                glider.style.transform = 'translateX(100%)';
                btnIncome.classList.add('text-primary');
                btnIncome.classList.remove('text-on-surface-variant');
                btnExpense.classList.remove('text-primary');
                btnExpense.classList.add('text-on-surface-variant');
            } else {
                glider.style.transform = 'translateX(0)';
                btnExpense.classList.add('text-primary');
                btnExpense.classList.remove('text-on-surface-variant');
                btnIncome.classList.remove('text-primary');
                btnIncome.classList.add('text-on-surface-variant');
            }
        }

        function selectCategory(el) {
            const allChips = document.querySelectorAll('.category-chip');
            allChips.forEach(chip => {
                const iconContainer = chip.querySelector('div');
                const label = chip.querySelector('span:last-child');
                chip.setAttribute('aria-selected', 'false');
                iconContainer.classList.remove('bg-primary', 'text-on-primary');
                iconContainer.classList.add('bg-surface-container', 'text-on-surface-variant');
                label.classList.remove('text-primary', 'font-semibold');
                label.classList.add('text-on-surface-variant');
            });

            el.setAttribute('aria-selected', 'true');
            const activeIcon = el.querySelector('div');
            const activeLabel = el.querySelector('span:last-child');
            activeIcon.classList.remove('bg-surface-container', 'text-on-surface-variant');
            activeIcon.classList.add('bg-primary', 'text-on-primary');
            activeLabel.classList.remove('text-on-surface-variant');
            activeLabel.classList.add('text-primary', 'font-semibold');
        }

        // Auto-focus amount on load
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('amount-input').focus();
        });

        // Numeric Keypad Friendly: Prevent non-numeric entry beyond dots
        document.getElementById('amount-input').addEventListener('input', function(e) {
            // Basic numeric cleaning logic if needed
        });
    </script>
